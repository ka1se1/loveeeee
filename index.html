<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>思い出アルバム</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #fafafa;
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h2 {
      font-size: 18px;
      margin-top: 0;
    }

    /* スライダー */
    .slider {
      overflow: hidden;
      border-radius: 12px;
    }

    .slides {
      display: flex;
      width: 100%;
      animation: slide 12s infinite;
    }

    .slides img {
      width: 100%;
      flex-shrink: 0;
      border-radius: 12px;
    }

    @keyframes slide {
      0% { transform: translateX(0%); }
      25% { transform: translateX(-100%); }
      50% { transform: translateX(-200%); }
      75% { transform: translateX(-300%); }
      100% { transform: translateX(0%); }
    }

    /* お店リスト */
    .shop {
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 10px;
      background: #f7f7f7;
      cursor: pointer;
    }

    .shop:active {
      transform: scale(0.98);
    }

    .shop-title {
      font-weight: bold;
    }

    .shop-desc {
      font-size: 12px;
      color: #666;
    }

    /* MAP */
    .map iframe {
      width: 100%;
      height: 250px;
      border: 0;
      border-radius: 12px;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      padding: 20px;
    }
  </style>
</head>
<body>

<header>
  💕 思い出アルバム 💕
</header>

<div class="container">

  <!-- 写真スライダー -->
  <div class="card">
    <h2>📸 思い出ギャラリー</h2>
    <div class="slider">
      <div class="slides">
        <img src="https://via.placeholder.com/600x400" />
        <img src="https://via.placeholder.com/600x400" />
        <img src="https://via.placeholder.com/600x400" />
        <img src="https://via.placeholder.com/600x400" />
      </div>
    </div>
  </div>

  <!-- Instagram（複数投稿風） -->
  <div class="card">
    <h2>📷 Instagramアルバム</h2>
    <p>お気に入り投稿をまとめるエリア</p>
    <iframe src="https://www.instagram.com/p/XXXXXXXX/embed" height="300" style="width:100%;border:none;border-radius:12px;"></iframe>
    <iframe src="https://www.instagram.com/p/YYYYYYYY/embed" height="300" style="width:100%;border:none;border-radius:12px;margin-top:10px;"></iframe>
  </div>

  <!-- お店リスト -->
  <div class="card">
    <h2>🍽 お店リスト（タップでMAP表示）</h2>

    <div class="shop" onclick="setMap('https://www.google.com/maps/embed?pb=AAA')">
      <div class="shop-title">○○カフェ</div>
      <div class="shop-desc">初デートで行った場所</div>
    </div>

    <div class="shop" onclick="setMap('https://www.google.com/maps/embed?pb=BBB')">
      <div class="shop-title">○○レストラン</div>
      <div class="shop-desc">記念日に行った夜景のお店</div>
    </div>

    <div class="shop" onclick="setMap('https://www.google.com/maps/embed?pb=CCC')">
      <div class="shop-title">○○パン屋</div>
      <div class="shop-desc">休日デートの寄り道</div>
    </div>
  </div>

  <!-- MAP -->
  <div class="card map">
    <h2>🗺 MAP</h2>
    <iframe id="map" src="https://www.google.com/maps/embed?pb=AAA"></iframe>
  </div>

</div>

<footer>
  Made with ❤️ Memory Page
</footer>

<script>
  function setMap(url) {
    document.getElementById('map').src = url;
    document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
