<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memories Shared</title>
    <style>
        body {
        
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, Arial, sans-serif;
            background: #f4f5f7;
            color: #333;
            scroll-behavior: smooth;
        }

        header {
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #fad0c4);
            background-size: 200% 200%;
            animation: gradientMove 5s ease infinite;
            color: white;
            padding: 24px 20px;
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            box-shadow: 0 4px 12px rgba(255, 154, 158, 0.3);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            padding: 20px 15px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        .card-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 18px;
            margin: 0;
        }

        .btn-round {
            background: #ff9a9e;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-round:disabled {
            background: #ccc;
        }

        .slider {
            overflow: hidden;
            border-radius: 16px;
            height: 220px;
            position: relative;
        }

        .slides {
            display: flex;
            gap: 12px;
            width: max-content;
        }

        .slides.active {
            animation: scrollLoop 20s linear infinite;
        }

        .slides img {
            height: 220px;
            width: auto;
            border-radius: 16px;
            object-fit: cover;
            flex-shrink: 0;

            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
        }

        @keyframes scrollLoop {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #ff9a9e;
            font-weight: bold;
            z-index: 10;
            text-align: center;
        }

        /* 【新規】写真一覧（グリッド） */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .gallery-grid img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        /* 読み込み中アニメーション */
        .loading-pulse {
            text-align: center;
            padding: 40px 20px;
            color: #ff9a9e;
            font-weight: bold;
            font-size: 14px;
            animation: pulse 1.5s infinite ease-in-out;
            align-self: center;
            width: 100%;
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        #shopListContainer {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
        }

        .shop-page {
            flex: 0 0 100%;
            width: 100%;
            max-width: 100%; /* ← これ追加 */
            box-sizing: border-box;
            scroll-snap-align: start;

            display: flex;
            flex-direction: column;
            gap: 10px;

            padding: 0 5px; /* ← 左右に少し余白つける */
        }

        .shop-card {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: #fdfdfd;
            border: 1px solid #eee;
            box-sizing: border-box;
        }
        
        .shop-title { font-weight: bold; font-size: 12px; margin-bottom: 4px; word-break: break-word; line-height: 1.2; }
        .shop-note { font-size: 10px; color: #666; flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 6px; }
        .shop-actions { display: flex; flex-direction: column; gap: 4px; margin-top: auto; }
        .insta-link { font-size: 9px; color: #fff; text-decoration: none; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding: 4px; border-radius: 8px; font-weight: bold; text-align: center; }
        .btn-delete-small { background: #ffe3e6; color: #d81b60; border: none; border-radius: 8px; padding: 4px; font-size: 9px; }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        .btn-save {
            background: #ff9a9e;
            color: white;
        }
        /* 🚀 スプラッシュスクリーン（ようこそ画面） */
        .splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #fad0c4);
            background-size: 200% 200%;
            animation: gradientMove 5s ease infinite;
            display: flex;
            align-items: center; justify-content: center;
            z-index: 9999; /* 一番手前に表示 */
            color: white;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .splash-content {
            text-align: center;
            animation: popIn 1s cubic-bezier(0.28, 0.84, 0.42, 1);
        }
        .splash-content h1 {
            font-size: 40px; margin: 0; letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .splash-content p {
            font-size: 16px; margin-top: 10px; font-weight: bold;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
    </style>
</head>

<body>

    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <h1>Our Memories</h1>
            <p>Welcome back! </p>
        </div>
    </div>

    <header>Our Memories</header>
    <div class="container">
        <div class="card">
            <div class="card-header-actions">
                <h2>📸 共有ギャラリー</h2>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-round" style="background: #e0e0e0; color: #555; font-size: 16px;"
                        onclick="deleteCurrentPhoto()" title="今見ている写真を消す">🗑️</button>
                    <button class="btn-round" id="uploadBtn" onclick="triggerPhotoUpload()">＋</button>
                </div>
            </div>
            <div class="slider">
                <div class="loading-overlay" id="uploadLoading">アップロード中... 🚀 (1/○枚目)</div>
                <div class="slides" id="slides">
                    <div class="loading-pulse">写真を読み込み中... 📸🔄</div>
                </div>
            </div>
            <div class="gallery-grid" id="galleryGrid"></div>
            <input type="file" id="photoUpload" accept="image/*" multiple style="display: none;"
                onchange="handlePhotoUpload(this)">
        </div>

        <div class="card">
            <div class="card-header-actions">
                <h2>🍽 お店リスト</h2>
                <button class="btn-round" onclick="openShopModal()">＋</button>
            </div>
            <div id="shopListContainer">
                <div class="loading-pulse">お店リストを読み込み中... 🍽️🔄</div>
            </div>
        </div>

        <div class="card" style="text-align: center;">
            <h2 style="margin-bottom: 15px;">🗺 MAP</h2>
            <iframe id="map" src="https://maps.google.co.jp/maps?q=日本&output=embed"
                style="width: 100%; max-width: 500px; height: 250px; border: none; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: block; margin: 0 auto;"></iframe>
        </div>

        <div class="card">
            <h2>📅 カレンダー</h2>
            <div style="border-radius: 16px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                <iframe
                    src="https://calendar.google.com/calendar/embed?height=400&wkst=2&bgcolor=%23ffffff&ctz=Asia%2FTokyo&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0"
                    style="border:solid 1px #eee" width="100%" height="350" frameborder="0" scrolling="no"></iframe>
            </div>
            <p style="text-align: center; font-size: 11px; color: #888; margin-top: 10px;">
                予定の追加や変更はGoogleカレンダーアプリから行ってね！
            </p>
        </div>
    </div>

    <div id="shopModal" class="modal-overlay">
        <div class="modal-content">
            <h3>お店を追加 🍽</h3>
            <div class="input-group"><label>店名</label><input type="text" id="shopNameInput"></div>
            <div class="input-group"><label>Instagram URL</label><input type="text" id="shopInstaInput"></div>
            <div class="input-group"><label>メモ</label><textarea id="shopNoteInput"></textarea></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeShopModal()">キャンセル</button>
                <button class="btn btn-save" onclick="saveShop()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ 下の3行を、必ずあなたのIDとキーに書き換えてください！ ⚠️
        const JSONBIN_BIN_ID = "69e06fd7856a6821893c5dec";
        const JSONBIN_API_KEY = "$2a$10$kakylabqJZLjJIRngThANeWMzSEMeRz4f.3Dr5ZFurxyfk16RV5Ia";
        const IMGBB_API_KEY = "553844648129b68e053a8598caaf2cb5";
        // ==========================================

        let shops = [];
        let photos = [];

        // --- クラウドデータの読み込み ---
        async function loadCloudData() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!response.ok) throw new Error("データの取得に失敗しました");
                const data = await response.json();

                // お店データと写真データを取得。写真が1枚もない場合は空配列にする
                shops = data.record.shops || [];
                photos = data.record.photos || [];

                renderShops();
                renderGallery();
            } catch (e) {
                console.error(e);
                document.getElementById('slides').innerHTML = '<div style="padding:20px;text-align:center;color:red;font-size:12px;">エラー：データの読み込みに失敗しました🥲</div>';
                document.getElementById('shopListContainer').innerHTML = '<div style="padding:20px;text-align:center;color:red;font-size:12px;">リストの読み込みに失敗しました🥲</div>';
            }
        }

        async function updateCloudData() {
            await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
                body: JSON.stringify({ shops, photos })
            });
        }

        // --- 写真アップロード (ImgBB) ・一括対応 ---
        function triggerPhotoUpload() { document.getElementById('photoUpload').click(); }

        async function handlePhotoUpload(input) {
            // ★複数ファイルに対応★
            if (!input.files || input.files.length === 0) return;

            const totalFiles = input.files.length;
            const newPhotoUrls = [];
            const uploadBtn = document.getElementById('uploadBtn');
            const uploadLoading = document.getElementById('uploadLoading');

            uploadBtn.disabled = true;
            uploadLoading.style.display = 'flex';
            uploadLoading.innerHTML = `アップロード中... 🚀 (1/${totalFiles}枚目)`; // 初期メッセージ

            let successCount = 0;

            // ファイルリストをループ処理
            for (let i = 0; i < totalFiles; i++) {
                // ローディングメッセージを更新
                uploadLoading.innerHTML = `アップロード中... 🚀 (${i + 1}/${totalFiles}枚目)`;

                const file = input.files[i];
                const formData = new FormData();
                formData.append('image', file);

                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const resData = await res.json();

                    if (resData.status === 200) {
                        newPhotoUrls.push(resData.data.url);
                        successCount++;
                    } else {
                        throw new Error("アップロード失敗");
                    }
                } catch (e) {
                    console.error(`${i + 1}枚目のアップロードに失敗しました🥲`, e);
                }
            }

            // すべて完了後、成功した写真をデータに追加
            if (newPhotoUrls.length > 0) {
                photos.push(...newPhotoUrls); // 配列を展開して追加
                await updateCloudData();
                renderGallery();
            }

            // メッセージを表示
            if (successCount === totalFiles) {
                alert(`${successCount}枚の写真をアップロードしました！✨`);
            } else if (successCount > 0) {
                alert(`${successCount}枚の写真をアップロードしました！(${totalFiles}枚中)\nいくつかの失敗がありました。🥲`);
            } else {
                alert("写真のアップロードに失敗しました。🥲\nIDやキーが合っているか確認してね！");
            }

            // ローディング解除
            uploadLoading.style.display = 'none';
            uploadBtn.disabled = false;
            input.value = ""; // リセット
        }

        // --- 写真削除機能 ---
        async function deleteCurrentPhoto() {
            // 写真を新しい順（逆順）にして表示しているので、削除対象のインデックスを計算
            if (photos.length === 0) { alert("削除する写真がありません！"); return; }
            if (!confirm("今表示されているこの写真を削除してもいいですか？")) return;

            // スライダー表示時のインデックスを、元のphotos配列のインデックスに逆換算
            const reversedIdx = slideIdx; // スライダーの何枚目か
            const totalPhotos = photos.length;
            const actualIdx = (totalPhotos - 1) - reversedIdx; // 元の配列のインデックス

            photos.splice(actualIdx, 1); // 削除
            await updateCloudData();
            slideIdx = 0;
            renderGallery();
        }

        // --- ギャラリー表示（スライダー＆一覧） ---
        let slideIdx = 0;
        let timer;
        function renderGallery() {
            const slides = document.getElementById('slides');
            const grid = document.getElementById('galleryGrid');

            slides.innerHTML = '';
            grid.innerHTML = '';
            slides.classList.remove('active'); // ← 一旦外す

            const displayPhotos = [...photos].reverse();

            // 👇 写真ない時（ここ重要）
            if (displayPhotos.length === 0) {
                slides.innerHTML = '<div class="loading-pulse">写真を読み込み中... 📸🔄</div>';
                return;
            }

            // 🔥 2回並べる
            const loopPhotos = [...displayPhotos, ...displayPhotos];

            loopPhotos.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                slides.appendChild(img);
            });

            slides.classList.add('active'); // ← 写真あるときだけ動かす
        }

        function startAutoSlide(count) {
            if (timer) clearInterval(timer);
            if (count <= 1) return;
            timer = setInterval(() => {
                slideIdx = (slideIdx + 1) % count;
                document.getElementById('slides').style.transform = `translateX(-${slideIdx * 100}%)`;
            }, 4000);
        }

        function renderShops() {
            const container = document.getElementById('shopListContainer');

            if (!shops.length) {
                container.innerHTML = '<div style="width:100%; text-align:center; font-size:12px; color:#999; padding:20px;">リストが空です🍽️</div>';
                return;
            }

            container.innerHTML = '';

            const displayShops = [...shops].reverse();

            // 👉 3件ずつグループ化
            for (let i = 0; i < displayShops.length; i += 3) {
                const page = document.createElement('div');
                page.className = 'shop-page';

                const group = displayShops.slice(i, i + 3);

                group.forEach((shop, j) => {
                    const actualIdx = (shops.length - 1) - (i + j);

                    const div = document.createElement('div');
                    div.className = 'shop-card';
                    div.onclick = () => {
                        document.getElementById('map').src =
                            `https://maps.google.co.jp/maps?q=${encodeURIComponent(shop.name)}&output=embed`;
                    };

                    div.innerHTML = `
                        <div class="shop-title">${shop.name}</div>
                        <div class="shop-note">${shop.note || ''}</div>
                        ${shop.insta ? `<a href="${shop.insta}" target="_blank" class="insta-link" onclick="event.stopPropagation()">Instagram</a>` : ''}
                        <button class="btn-delete-small" onclick="deleteShop(${actualIdx}); event.stopPropagation();">削除</button>
                    `;

                    page.appendChild(div);
                });

                container.appendChild(page);
            }
        }

        async function saveShop() {
            const name = document.getElementById('shopNameInput').value;
            const insta = document.getElementById('shopInstaInput').value;
            const note = document.getElementById('shopNoteInput').value;
            if (!name) { alert("店名を入れてね！"); return; }
            shops.push({ name, insta, note });
            await updateCloudData();
            closeShopModal();
            renderShops();

            // 入力欄を空に戻す
            document.getElementById('shopNameInput').value = '';
            document.getElementById('shopInstaInput').value = '';
            document.getElementById('shopNoteInput').value = '';
        }

        async function deleteShop(actualIdx) {
            if (!confirm("消してもいい？")) return;
            shops.splice(actualIdx, 1);
            await updateCloudData();
            renderShops();
        }

        function openShopModal() { document.getElementById('shopModal').classList.add('active'); }
        function closeShopModal() { document.getElementById('shopModal').classList.remove('active'); }

        // --- 起動と自動同期 ---
        // 最初に読み込む
        loadCloudData();

        // 15秒ごとにクラウド（JSONBin）をチェックして、勝手に最新にする
        setInterval(() => {
            loadCloudData();
            console.log("最新のデータを同期しました 🔄");
        }, 15000); 
        // 🚀 画面を開いてから1.5秒後にスプラッシュスクリーンをフワッと消す
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splashScreen').classList.add('hidden');
            }, 1500); // 1500 = 1.5秒（短くしたければ1000、長くしたければ2000に変更）
        });
        window.onclick = function(e) {
            const modal = document.getElementById('shopModal');
            if (e.target === modal) {
                closeShopModal();
            }
        }
    </script>
</body>

</html>
