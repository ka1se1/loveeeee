<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memories</title>
    <style>
        /* --- 全体のベース --- */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, Arial, sans-serif;
            background: #f4f5f7;
            color: #333;
            /* スクロールを滑らかに */
            scroll-behavior: smooth; 
        }

        /* --- ヘッダー（グラデーションアニメーション追加） --- */
        header {
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #fad0c4);
            background-size: 200% 200%;
            animation: gradientMove 5s ease infinite;
            color: white;
            padding: 24px 20px;
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            box-shadow: 0 4px 12px rgba(255, 154, 158, 0.3);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            position: relative;
            z-index: 10;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- コンテナとカード（フェードインアニメーション追加） --- */
        .container {
            padding: 20px 15px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease forwards;
        }

        /* カードの出現タイミングを少しずつずらす */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- スライダー --- */
        .slider {
            overflow: hidden;
            border-radius: 16px;
            height: 220px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .slides {
            display: flex;
            height: 100%;
            /* JSで制御するため初期状態はそのまま */
        }

        .slides img {
            width: 100%;
            flex-shrink: 0;
            object-fit: cover;
            height: 220px;
        }

        /* --- お店リスト --- */
        .shop {
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 12px;
            background: #fdfdfd;
            border: 1px solid #eee;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .shop:active {
            transform: scale(0.96);
            background: #ffeef0;
            border-color: #ff9a9e;
        }

        .shop-title {
            font-weight: bold;
            font-size: 16px;
        }

        .shop-desc {
            font-size: 13px;
            color: #888;
        }

        /* --- マップ --- */
        .map iframe {
            width: 100%;
            height: 250px;
            border: 0;
            border-radius: 16px;
            background-color: #eee; /* 読み込み前のプレースホルダー */
        }

        /* --- カレンダー --- */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .calendar-header button {
            background: #f0f0f0;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .calendar-header button:active {
            background: #ddd;
            transform: scale(0.9);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        /* 曜日のスタイル */
        .weekday {
            font-size: 12px;
            font-weight: bold;
            color: #888;
            padding-bottom: 5px;
        }
        .weekday:first-child { color: #ff6b6b; } /* 日曜 */
        .weekday:last-child { color: #4da8da; } /* 土曜 */

        .day {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 10px 5px;
            font-size: 14px;
            cursor: pointer;
            min-height: 45px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .day:active {
            transform: scale(0.9);
            background: #e0e0e0;
        }

        .day.has-event {
            background: #ffe3e6;
            color: #d81b60;
            font-weight: bold;
            box-shadow: inset 0 0 0 1px #ff9a9e;
        }

        .event-icon {
            font-size: 10px;
            margin-top: 2px;
        }

        /* --- フッター --- */
        footer {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            padding: 30px 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        Memories
    </header>

    <div class="container">

        <div class="card">
            <h2>📸 思い出ギャラリー</h2>
            <div class="slider">
                <div class="slides" id="slides">
                    <img src="https://cdn.cheapoguides.com/wp-content/uploads/sites/2/2020/08/hydrangea-kamakura-Lily-C-B.jpg" alt="memory1" />
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS9U6YTJ960SxJdz7IBIr17kQl9BjLRkNp6eg&s" alt="memory2" />
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRW1nrdRCmskZ1OAqMZpf5sSGLBBUBSgcoSKQ&s" alt="memory3" />
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRtol7w5I5EC7PTHZcWCCsk3p82zv0l79gqWA&s" alt="memory4" />
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🍽 お店リスト</h2>
            <div class="shop" onclick="setMap('https://maps.google.com/maps?q=Tokyo+Tower&t=&z=15&ie=UTF8&iwloc=&output=embed')">
                <div class="shop-title">○○カフェ</div>
                <div class="shop-desc">初デートでパンケーキを食べた場所🥞</div>
            </div>

            <div class="shop" onclick="setMap('https://maps.google.com/maps?q=Tokyo+Skytree&t=&z=15&ie=UTF8&iwloc=&output=embed')">
                <div class="shop-title">○○レストラン</div>
                <div class="shop-desc">1年記念日のディナー🍷</div>
            </div>
        </div>

        <div class="card map">
            <h2>🗺 MAP</h2>
            <iframe id="map" src="https://maps.google.com/maps?q=Tokyo+Tower&t=&z=15&ie=UTF8&iwloc=&output=embed" loading="lazy"></iframe>
        </div>

        <div class="card">
            <h2>📅 カレンダー</h2>
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀</button>
                <div id="monthLabel"></div>
                <button onclick="changeMonth(1)">▶</button>
            </div>
            <div class="calendar-grid" id="calendar"></div>
        </div>

    </div>

    <footer>
        Made with ❤️ Our Memory Page
    </footer>

    <script>
        // --- マップ連動 ---
        function setMap(url) {
            const mapFrame = document.getElementById('map');
            mapFrame.style.opacity = 0; // 一瞬消して
            setTimeout(() => {
                mapFrame.src = url;
                mapFrame.style.transition = "opacity 0.5s";
                mapFrame.style.opacity = 1; // ふわっと表示
            }, 200);
            
            // 少し下にスクロールしてマップを見やすくする
            mapFrame.parentElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // --- スライダー（空白バグ解消版） ---
        const slides = document.getElementById('slides');
        // 無限ループを綺麗に見せるため、最初の画像を最後にクローンして追加
        const firstImgClone = slides.children[0].cloneNode(true);
        slides.appendChild(firstImgClone);
        
        let index = 0;
        const totalSlides = slides.children.length; // クローン含めて5枚

        setInterval(() => {
            index++;
            slides.style.transition = 'transform 0.5s ease-in-out';
            slides.style.transform = `translateX(-${index * 100}%)`;

            // クローン（最後の画像）まで到達したら、アニメーションなしで0枚目に戻す
            if (index === totalSlides - 1) {
                setTimeout(() => {
                    slides.style.transition = 'none';
                    index = 0;
                    slides.style.transform = 'translateX(0)';
                }, 500); // transition時間と同じ500ms待つ
            }
        }, 3500);

        // --- カレンダー ---
        let currentDate = new Date();
        let events = JSON.parse(localStorage.getItem('events') || '{}');

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('monthLabel').innerText = `${year}年 ${month + 1}月`;

            // 曜日の描画を追加
            const weekDays = ['日', '月', '火', '水', '木', '金', '土'];
            weekDays.forEach(day => {
                cal.innerHTML += `<div class="weekday">${day}</div>`;
            });

            const firstDay = new Date(year, month, 1).getDay();
            const days = new Date(year, month + 1, 0).getDate();

            // 1日の前の空白
            for (let i = 0; i < firstDay; i++) {
                cal.innerHTML += '<div></div>';
            }

            // 日付の描画
            for (let d = 1; d <= days; d++) {
                const key = `${year}-${month + 1}-${d}`;
                const has = events[key];

                cal.innerHTML += `
                    <div class="day ${has ? 'has-event' : ''}" onclick="editEvent('${key}')">
                        ${d}
                        ${has ? '<span class="event-icon">💖</span>' : ''}
                    </div>
                `;
            }
        }

        function editEvent(key) {
            const text = prompt('予定や思い出を入力してね✏️', events[key] || '');
            if (text === null) return; // キャンセル時
            if (text.trim() === '') {
                delete events[key];
            } else {
                events[key] = text;
            }
            localStorage.setItem('events', JSON.stringify(events));
            renderCalendar();
        }

        function changeMonth(n) {
            currentDate.setMonth(currentDate.getMonth() + n);
            renderCalendar();
        }

        // 初期描画
        renderCalendar();
    </script>

</body>
</html>
