<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memories Shared</title>
    <style>
        /* デザインはそのまま維持 */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, Arial, sans-serif;
            background: #f4f5f7;
            color: #333;
            scroll-behavior: smooth;
        }

        header {
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #fad0c4);
            background-size: 200% 200%;
            animation: gradientMove 5s ease infinite;
            color: white;
            padding: 24px 20px;
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            box-shadow: 0 4px 12px rgba(255, 154, 158, 0.3);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            padding: 20px 15px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        .card-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h2 {
            font-size: 18px;
            margin: 0;
        }

        .btn-round {
            background: #ff9a9e;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-round:disabled {
            background: #ccc;
        }

        /* スライダー */
        .slider {
            overflow: hidden;
            border-radius: 16px;
            height: 220px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            background: #eee;
            position: relative;
        }

        .slides {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease;
        }

        .slides img {
            width: 100%;
            flex-shrink: 0;
            object-fit: cover;
            height: 220px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #ff9a9e;
            font-weight: bold;
            z-index: 10;
        }

        /* お店・カレンダー・モーダルのスタイル（前回同様） */
        .shop-card {
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 12px;
            background: #fdfdfd;
            border: 1px solid #eee;
            position: relative;
            cursor: pointer;
        }

        .shop-title {
            font-weight: bold;
            font-size: 16px;
        }

        .shop-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .insta-link {
            font-size: 12px;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .btn-delete-small {
            background: #ffe3e6;
            color: #d81b60;
            border: none;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 11px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .day {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 10px 5px;
            font-size: 14px;
            cursor: pointer;
            min-height: 40px;
        }

        .day.has-event {
            background: #ffe3e6;
            color: #d81b60;
            font-weight: bold;
        }

        /* モーダル */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        .btn-save {
            background: #ff9a9e;
            color: white;
        }

        .map iframe {
            width: 100%;
            height: 200px;
            border: 0;
            border-radius: 16px;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #aaa;
            padding: 20px;
        }

        /* 読み込み中のフワフワ点滅アニメーション */
        .loading-pulse {
            text-align: center;
            padding: 40px 20px;
            color: #ff9a9e;
            font-weight: bold;
            font-size: 14px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }
    </style>
</head>

<body>

    <header>Our Memories</header>

    <div class="container">
        <div class="card">
            <div class="card-header-actions">
                <h2>📸 共有ギャラリー</h2>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-round" style="background: #e0e0e0; color: #555; font-size: 16px;"
                        onclick="deleteCurrentPhoto()" title="今見ている写真を消す">🗑️</button>
                    <button class="btn-round" id="uploadBtn" onclick="triggerPhotoUpload()">＋</button>
                </div>
            </div>
            <div class="slider">
                <div class="loading-overlay" id="uploadLoading">アップロード中... 🚀</div>
                <div class="slides" id="slides"></div>
            </div>
            <input type="file" id="photoUpload" accept="image/*" style="display: none;"
                onchange="handlePhotoUpload(this)">
        </div>

        <div class="card">
            <div class="card-header-actions">
                <h2>🍽 お店リスト</h2>
                <button class="btn-round" onclick="openShopModal()">＋</button>
            </div>
            <div id="shopListContainer"></div>
        </div>

        <div class="card">
            <h2>🗺 MAP</h2>
            <iframe id="map"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3240.8280303808788!2d139.76493611525882!3d35.68123618019432!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188bfbd89f700b%3A0x277c49539d93690d!2z5p2x5Lqs6aeF!5e0!3m2!1sja!2sjp!4v1625000000000!5m2!1sja!2sjp"></iframe>
        </div>

        <div class="card">
            <h2>📅 カレンダー (個人)</h2>
            <div class="calendar-grid" id="calendar"></div>
        </div>
    </div>

    <div id="shopModal" class="modal-overlay">
        <div class="modal-content">
            <h3>お店を追加 🍽</h3>
            <div class="input-group"><label>店名</label><input type="text" id="shopNameInput"></div>
            <div class="input-group"><label>Instagram URL</label><input type="text" id="shopInstaInput"></div>
            <div class="input-group"><label>メモ</label><textarea id="shopNoteInput"></textarea></div>
            <div class="modal-actions">
                <button class="btn" onclick="closeShopModal()">キャンセル</button>
                <button class="btn btn-save" onclick="saveShop()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        const JSONBIN_BIN_ID = "69e06fd7856a6821893c5dec";
        const JSONBIN_API_KEY = "$2a$10$kakylabqJZLjJIRngThANeWMzSEMeRz4f.3Dr5ZFurxyfk16RV5Ia";
        const IMGBB_API_KEY = "553844648129b68e053a8598caaf2cb5";
        // ==========================================

        let shops = [];
        let photos = []; // クラウド上の写真URLが入る
        let events = JSON.parse(localStorage.getItem('events') || '{}');

        // --- クラウドデータの読み込み ---
        async function loadCloudData() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                const data = await response.json();
                shops = data.record.shops || [];
                photos = data.record.photos || [];
                renderShops();
                renderGallery();
            } catch (e) { console.error(e); }
        }

        async function updateCloudData() {
            await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
                body: JSON.stringify({ shops, photos })
            });
        }

        // --- Imgbbへのアップロード ---
        async function handlePhotoUpload(input) {
            if (!input.files || !input.files[0]) return;

            const file = input.files[0];
            const formData = new FormData();
            formData.append('image', file);

            document.getElementById('uploadLoading').style.display = 'flex';
            document.getElementById('uploadBtn').disabled = true;

            try {
                // 1. ImgBBにアップロードして画像のURLをもらう
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const resData = await res.json();
                const imageUrl = resData.data.url;

                // 2. そのURLをJSONBinに保存（これで共有完了！）
                photos.push(imageUrl);
                await updateCloudData();

                renderGallery();
            } catch (e) {
                console.error(e);
                alert("アップロードに失敗しました🥲");
            } finally {
                document.getElementById('uploadLoading').style.display = 'none';
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        function renderGallery() {
            const slides = document.getElementById('slides');
            slides.innerHTML = '';
            // 写真がない時のダミー
            const displayPhotos = photos.length > 0 ? photos : ["https://images.unsplash.com/photo-1516483638261-f4dbaf036963?auto=format&fit=crop&w=800&q=80"];

            displayPhotos.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                slides.appendChild(img);
            });
            startAutoSlide(displayPhotos.length);
        }

        let slideIdx = 0;
        let timer;
        function startAutoSlide(count) {
            if (timer) clearInterval(timer);
            if (count <= 1) return;
            timer = setInterval(() => {
                slideIdx = (slideIdx + 1) % count;
                document.getElementById('slides').style.transform = `translateX(-${slideIdx * 100}%)`;
            }, 4000);
        }

        // --- お店リスト機能（前回と同様） ---
        function renderShops() {
            const container = document.getElementById('shopListContainer');
            container.innerHTML = shops.length ? '' : '<div style="text-align:center;font-size:12px;color:#999;">リストが空です</div>';
            shops.forEach((shop, i) => {
                const div = document.createElement('div');
                div.className = 'shop-card';
                div.onclick = () => {
                    document.getElementById('map').src = `https://www.google.com/maps/embed/v1/search?key=YOUR_GOOGLE_MAP_API_KEY_OR_USE_IFRAME_GENERATOR&q=${encodeURIComponent(shop.name)}`;
                    // ※簡易MAP表示のため前回のURL形式を推奨
                    document.getElementById('map').src = `https://maps.google.com/maps?q=${encodeURIComponent(shop.name)}&output=embed`;
                };
                div.innerHTML = `
                    <div class="shop-title">${shop.name}</div>
                    <div style="font-size:12px;color:#666;">${shop.note || ''}</div>
                    <div class="shop-actions">
                        ${shop.insta ? `<a href="${shop.insta}" target="_blank" class="insta-link" onclick="event.stopPropagation()">Instagram</a>` : '<span></span>'}
                        <button class="btn-delete-small" onclick="deleteShop(${i}); event.stopPropagation();">削除</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        async function saveShop() {
            const name = document.getElementById('shopNameInput').value;
            const insta = document.getElementById('shopInstaInput').value;
            const note = document.getElementById('shopNoteInput').value;
            if (!name) return;
            shops.push({ name, insta, note });
            await updateCloudData();
            closeShopModal();
            renderShops();
        }

        async function deleteShop(i) {
            if (!confirm("消してもいい？")) return;
            shops.splice(i, 1);
            await updateCloudData();
            renderShops();
        }

        function openShopModal() { document.getElementById('shopModal').classList.add('active'); }
        function closeShopModal() { document.getElementById('shopModal').classList.remove('active'); }

        // --- カレンダー (個人保存) ---
        function renderCalendar() {
            const cal = document.getElementById('calendar');
            const days = new Date(2024, new Date().getMonth() + 1, 0).getDate();
            for (let d = 1; d <= days; d++) {
                const el = document.createElement('div');
                el.className = 'day';
                el.innerText = d;
                cal.appendChild(el);
            }
        }

        // 起動
        loadCloudData();
        renderCalendar();
    </script>
</body>

</html>
