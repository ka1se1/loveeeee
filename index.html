<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
            background: #fafafa;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h2 {
            font-size: 18px;
            margin-top: 0;
        }

        .slider {
            overflow: hidden;
            border-radius: 12px;
            height: 200px;
        }

        .slides {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease;
        }

        .slides img {
            width: 100%;
            flex-shrink: 0;
            object-fit: cover;
            height: 200px;
        }

        .shop {
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #f7f7f7;
            cursor: pointer;
        }

        .shop:active {
            transform: scale(0.98);
        }

        .shop-title {
            font-weight: bold;
        }

        .shop-desc {
            font-size: 12px;
            color: #666;
        }

        .map iframe {
            width: 100%;
            height: 250px;
            border: 0;
            border-radius: 12px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day {
            background: #f2f2f2;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            cursor: pointer;
            min-height: 40px;
        }

        .day.has-event {
            background: #ffdde1;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 20px;
        }
    </style>
</head>

<body>

    <header>
        Memories
    </header>

    <div class="container">

        <div class="card">
            <h2>📸 思い出ギャラリー</h2>
            <div class="slider">
                <div class="slides" id="slides">
                    <img
                        src="https://cdn.cheapoguides.com/wp-content/uploads/sites/2/2020/08/hydrangea-kamakura-Lily-C-B.jpg" />
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS9U6YTJ960SxJdz7IBIr17kQl9BjLRkNp6eg&s" />
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRW1nrdRCmskZ1OAqMZpf5sSGLBBUBSgcoSKQ&s" />
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRtol7w5I5EC7PTHZcWCCsk3p82zv0l79gqWA&s" />
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🍽 お店リスト</h2>
            <div class="shop" onclick="setMap('https://www.google.com/maps/embed?pb=AAA')">
                <div class="shop-title">○○カフェ</div>
                <div class="shop-desc">初デート</div>
            </div>

            <div class="shop" onclick="setMap('https://www.google.com/maps/embed?pb=BBB')">
                <div class="shop-title">○○レストラン</div>
                <div class="shop-desc">記念日</div>
            </div>
        </div>

        <div class="card map">
            <h2>🗺 MAP</h2>
            <iframe id="map" src="https://www.google.com/maps/embed?pb=AAA"></iframe>
        </div>

        <div class="card">
            <h2>📅 カレンダー</h2>

            <div class="calendar-header">
                <button onclick="changeMonth(-1)">◀</button>
                <div id="monthLabel"></div>
                <button onclick="changeMonth(1)">▶</button>
            </div>

            <div class="calendar-grid" id="calendar"></div>
        </div>

    </div>

    <footer>
        Made with ❤️ Memory Page
    </footer>

    <script>
        function setMap(url) {
            document.getElementById('map').src = url;
            document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
        }

        // スライダー
        const slides = document.getElementById('slides');
        let index = 0;
        const total = slides.children.length;

        setInterval(() => {
            index++;
            slides.style.transform = `translateX(-${index * 100}%)`;
            slides.style.transition = 'transform 0.5s ease';

            if (index === total) {
                setTimeout(() => {
                    slides.style.transition = 'none';
                    index = 0;
                    slides.style.transform = 'translateX(0)';
                }, 500);
            }
        }, 3000);

        // カレンダー（修正：変数名変更）
        let currentDate = new Date();
        let events = JSON.parse(localStorage.getItem('events') || '{}');

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('monthLabel').innerText =
                year + '年 ' + (month + 1) + '月';

            const firstDay = new Date(year, month, 1).getDay();
            const days = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) cal.innerHTML += '<div></div>';

            for (let d = 1; d <= days; d++) {
                const key = year + '-' + (month + 1) + '-' + d;
                const has = events[key];

                cal.innerHTML += `<div class="day ${has ? 'has-event' : ''}" onclick="editEvent('${key}')">${d}${has ? '<br>💖' : ''}</div>`;
            }
        }

        function editEvent(key) {
            const text = prompt('予定を入力', events[key] || '');
            if (text === null) return;
            if (text === '') delete events[key];
            else events[key] = text;
            localStorage.setItem('events', JSON.stringify(events));
            renderCalendar();
        }

        function changeMonth(n) {
            currentDate.setMonth(currentDate.getMonth() + n);
            renderCalendar();
        }

        renderCalendar();
    </script>

</body>

</html>
