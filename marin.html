<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思い出アルバム</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background: #fafafa;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h2 {
            font-size: 18px;
            margin-top: 0;
        }

        .instagram iframe {
            width: 100%;
            border: none;
            border-radius: 12px;
            overflow: hidden;
        }

        .map iframe {
            width: 100%;
            height: 250px;
            border: 0;
            border-radius: 12px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            object-fit: cover;
        }

        .shop-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 20px;
        }
    </style>
</head>

<body>

    <header>
        💕 思い出アルバム 💕
    </header>

    <div class="container">

        <div class="card">
            <h2>📸 思い出ギャラリー</h2>
            <div class="gallery">
                <img src="https://via.placeholder.com/300" alt="photo1">
                <img src="https://via.placeholder.com/300" alt="photo2">
                <img src="https://via.placeholder.com/300" alt="photo3">
                <img src="https://via.placeholder.com/300" alt="photo4">
            </div>
        </div>

        <div class="card instagram">
            <h2>📷 Instagram</h2>
            <!-- Instagram埋め込みURLをここに -->
            <iframe src="https://www.instagram.com/p/XXXXXXXX/embed" height="400"></iframe>
        </div>

        <div class="card shop-info">
            <h2>🍽 お店情報</h2>
            <p><strong>店名：</strong>○○カフェ</p>
            <p><strong>住所：</strong>東京都○○区○○</p>
            <p><strong>思い出：</strong>初デートで行ったカフェ</p>
        </div>

        <div class="card map">
            <h2>🗺 MAP</h2>
            <!-- Google Maps埋め込み -->
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!..." allowfullscreen="" loading="lazy">
            </iframe>
        </div>

    </div>

    <footer>
        Made with ❤️ Memory Page
    </footer>

</body>

</html>
